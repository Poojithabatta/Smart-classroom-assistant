<!DOCTYPE html>
<html>
<head>
    <title>Smart Classroom Assistant</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
        }
        #chatbox {
            width: 300px;
            height: 200px;
            border: 1px solid #ccc;
            margin: auto;
            overflow-y: scroll;
            background: white;
            padding: 10px;
        }
        input {
            padding: 10px;
            width: 200px;
        }
        button {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<h1>Smart Classroom Assistant</h1>

<div id="chatbox"></div><br>

<input type="text" id="userInput" placeholder="Ask something...">
<button onclick="sendMessage()">Send</button>

<script>
function sendMessage() {
    let input = document.getElementById("userInput").value.trim();
    let response = "";

    if (input === "") {
        response = "Please enter a question.";
    } 
    else if (input.toLowerCase().includes("attendance")) {
        response = "Attendance is automatically tracked.";
    } 
    else if (input.toLowerCase().includes("marks")) {
        response = "Marks are shown in dashboard.";
    } 
    else if (input.toLowerCase().includes("hello")) {
        response = "Hello! How can I help you?";
    } 
    else {
        response = "Sorry, I will improve to answer this.";
    }

    document.getElementById("chatbox").innerHTML += "<p><b>You:</b> " + input + "</p>";
    document.getElementById("chatbox").innerHTML += "<p><b>Bot:</b> " + response + "</p>";

    document.getElementById("userInput").value = " ";
}
</script>

</body>
</html>
