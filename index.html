<!DOCTYPE html>
<html>
<head>
    <title>Smart Classroom Assistant</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
        }

        .box {
            background: white;
            width: 350px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 80%;
        }

        button {
            padding: 10px;
            margin: 5px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }

        #chatbox {
            height: 150px;
            overflow-y: scroll;
            border: 1px solid #ccc;
            margin-top: 10px;
            padding: 10px;
        }
    </style>
</head>

<body>

<h1>Smart Classroom Assistant</h1>

<div id="loginBox" class="box">
    <h3>Student Login</h3>
    <input type="text" id="username" placeholder="Enter ID"><br>
    <input type="password" id="password" placeholder="Enter Password"><br>
    <button onclick="login()">Login</button>
    <p id="loginMsg"></p>
</div>

<div id="mainBox" class="box" style="display:none;">

    <h3>Welcome Student</h3>

    <button onclick="showAttendance()">Attendance</button>
    <button onclick="showPerformance()">Performance</button>
    <button onclick="showNotes()">Notes</button>

    <p id="output"></p>

    <h3>AI Chatbot</h3>

    <div id="chatbox"></div><br>

    <input type="text" id="userInput" placeholder="Ask something...">
    <button onclick="sendMessage()">Send</button>

</div>

<script>

let currentUser = "";

// LOGIN FUNCTION
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if (user === "poojitha" && pass === "1234") {
        currentUser = user;
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("mainBox").style.display = "block";
    } else {
        document.getElementById("loginMsg").innerText = "Invalid ID or Password";
    }
}

// DATA FUNCTIONS
function showAttendance() {
    if (currentUser === "poojitha") {
        document.getElementById("output").innerText = "Attendance: 92%";
    }
}

function showPerformance() {
    if (currentUser === "poojitha") {
        document.getElementById("output").innerText = "Performance: Good";
    }
}

function showNotes() {
    document.getElementById("output").innerText = "Notes available for all subjects.";
}

// CHATBOT
function sendMessage() {
    let input = document.getElementById("userInput").value.trim();
    let response = "";

    if (input === "") {
        response = "Please enter a question.";
    } 
    else if (input.toLowerCase().includes("attendance")) {
        response = "Your attendance is 92%";
    } 
    else if (input.toLowerCase().includes("performance")) {
        response = "Your performance is good";
    } 
    else if (input.toLowerCase().includes("ai")) {
        response = "AI means Artificial Intelligence";
    } 
    else {
        response = "Ask about attendance, performance or notes.";
    }

    document.getElementById("chatbox").innerHTML += "<p>You: " + input + "</p>";
    document.getElementById("chatbox").innerHTML += "<p>Bot: " + response + "</p>";

    document.getElementById("userInput").value = "";
}

</script>

</body>
</html>
